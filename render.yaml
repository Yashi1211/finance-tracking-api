# Render Blueprint — https://render.com/docs/blueprint-spec
# After push: Dashboard → New → Blueprint → connect this repo → apply.
#
# Live deployment (this service):
#   https://finance-tracking-api.onrender.com
#   Docs: https://finance-tracking-api.onrender.com/docs
#   Health: https://finance-tracking-api.onrender.com/health

services:
  - type: web
    name: finance-tracking-api
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: SECRET_KEY
        generateValue: true
